<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg-primary: #09090e;
      --bg-card: rgba(22, 22, 31, 0.85);
      --border: rgba(139, 92, 246, 0.18);
      --accent: #8b5cf6;
      --accent-light: #a78bfa;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
    }

    body {
      width: 300px;
      margin: 0;
      padding: 16px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      overflow-x: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
      margin-bottom: 4px;
    }

    .header h2 {
      margin: 0;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, #a78bfa 0%, #60a5fa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: #ef4444; /* default offline */
      box-shadow: 0 0 8px rgba(239, 68, 68, 0.5);
    }
    .status-dot.online {
      background-color: #10b981;
      box-shadow: 0 0 8px rgba(16, 185, 129, 0.5);
    }

    /* Glass Card */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
    }

    /* Active Anime Section */
    .anime-container {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .poster {
      width: 55px;
      height: 75px;
      border-radius: 6px;
      object-fit: cover;
      background: #1e1b4b;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .anime-details {
      flex: 1;
      min-width: 0;
    }

    .anime-title {
      font-size: 13px;
      font-weight: 700;
      margin: 0 0 4px 0;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .anime-meta {
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    /* Episode Controller */
    .controller {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 8px;
      width: fit-content;
    }

    .btn-circle {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: #1e1b4b;
      color: var(--text-primary);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .btn-circle:hover {
      background: var(--accent);
      border-color: var(--accent);
    }
    .btn-circle:active {
      transform: scale(0.9);
    }

    .count {
      font-size: 12px;
      font-weight: 700;
      min-width: 55px;
      text-align: center;
    }

    /* Progress bar */
    .progress-track {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent) 0%, var(--accent-light) 100%);
      transition: width 0.3s ease;
    }

    /* Global Stats Section */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .stat-box {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.03);
      border-radius: 8px;
      padding: 10px;
      text-align: center;
    }

    .stat-val {
      font-size: 18px;
      font-weight: 800;
      color: var(--accent-light);
      margin-bottom: 2px;
    }

    .stat-lbl {
      font-size: 10px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Global Ingestion Button */
    .action-btn {
      width: 100%;
      padding: 8px;
      background: linear-gradient(135deg, #7c3aed, #6366f1);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 4px;
      box-shadow: 0 4px 15px rgba(124, 58, 237, 0.3);
    }
    .action-btn:hover {
      filter: brightness(1.1);
    }
    .action-btn:active {
      transform: scale(0.98);
    }

    .action-btn.secondary {
      background: rgba(139, 92, 246, 0.12);
      border: 1px solid var(--accent);
      color: var(--accent-light);
      box-shadow: none;
    }

    /* Warnings & Alerts */
    .warning {
      color: #f87171;
      font-size: 12px;
      text-align: center;
      padding: 10px;
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: 8px;
    }

    .footer {
      font-size: 10px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 6px;
    }
  </style>
  <title>AniTrack Companion</title>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <h2>AniTrack</h2>
      <div id="connection-dot" class="status-dot"></div>
    </div>

    <!-- Main Dynamic Section -->
    <div id="main-content">
      <div style="text-align: center; padding: 20px 0; color: var(--text-secondary); font-size: 13px;">
        Connecting to AniTrack...
      </div>
    </div>

    <!-- Footer -->
    <div class="footer">AniTrack Extension v1.1</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
