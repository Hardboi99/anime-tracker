<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 260px;
      margin: 0;
      padding: 16px;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      background-color: #0b0b0f;
      color: #e2e8f0;
    }
    .card {
      background: rgba(22, 22, 31, 0.85);
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 12px;
      padding: 14px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }
    h3 {
      margin: 0 0 10px 0;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #a78bfa 0%, #60a5fa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p {
      margin: 0;
      font-size: 13px;
      color: #94a3b8;
    }
    .domain {
      margin-top: 8px;
      font-size: 16px;
      font-weight: 700;
      color: #f1f5f9;
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.25);
      border-radius: 6px;
      padding: 6px 12px;
      word-break: break-all;
      display: inline-block;
    }
    .footer {
      margin-top: 14px;
      font-size: 11px;
      color: #64748b;
    }
  </style>
  <title>AniTrack Detector</title>
</head>
<body>
  <div class="card">
    <h3>AniTrack Detector</h3>
    <p>You are on:</p>
    <div id="website-domain" class="domain">Loading...</div>
    <div class="footer">AniTrack Extension v1.0</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
